#
# cargo-deny configuration — license allowlist, banned crates, source policy.
# Run: cargo deny check

[graph]
all-features    = false
no-default-features = false

# ---------------------------------------------------------------------------
# License policy
# ---------------------------------------------------------------------------
[licenses]
# Require high confidence for license detection
confidence-threshold = 0.8

allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]

# ---------------------------------------------------------------------------
# Security advisories
# ---------------------------------------------------------------------------
[advisories]
db-path   = "~/.cargo/advisory-db"
db-urls   = ["https://github.com/rustsec/advisory-db"]
yanked    = "warn"
ignore    = [
    # rustls-pemfile is unmaintained but pulled transitively by rig-core → reqwest 0.11;
    # we cannot upgrade it until rig-core drops reqwest 0.11.
    "RUSTSEC-2025-0134",
]

# ---------------------------------------------------------------------------
# Banned crates
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards         = "warn"

deny = [
    # System OpenSSL dep breaks musl/alpine cross-compilation.
    # Allowed transitively via rig-core → native-tls → openssl-sys.
    { name = "openssl-sys", wrappers = ["openssl", "native-tls"] },
    # reqwest carries 30+ transitive deps we do not need.
    # Allowed transitively via rig-core and genai.
    { name = "reqwest", wrappers = ["rig-core", "genai", "reqwest-eventsource"] },
]

skip = [
    # rig-core transitively pulls reqwest 0.11 and openssl-sys;
    # we cannot remove them until rig-core drops these dependencies.
    { crate = "reqwest@0.11", reason = "transitive dep of rig-core" },
    { crate = "reqwest@0.12", reason = "transitive dep of genai" },
]

# ---------------------------------------------------------------------------
# Source policy — only crates.io, no unknown git sources
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git      = "deny"

allow-registry = ["https://github.com/rust-lang/crates.io-index"]
