[book]
title = "a2a-rust"
description = "Official Rust SDK for the A2A (Agent-to-Agent) protocol — build interoperable AI agents with type-safe, async Rust"
authors = ["Tom F."]
language = "en"
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/tomtom215/a2a-rust"
edit-url-template = "https://github.com/tomtom215/a2a-rust/edit/main/book/{path}"
additional-css = ["theme/custom.css"]
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 20
boost-hierarchy = 2
