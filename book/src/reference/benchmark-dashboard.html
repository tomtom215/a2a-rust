<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0c0e;--surface:#141417;--border:#232329;--cyan:#00e5cc;--amber:#f5a623;
--green:#00d68f;--rose:#ff6b8a;--violet:#b18cfe;--blue:#5b9cf6;--text:#eaeaed;
--text-sec:#9898a4;--text-muted:#56565f;--radius:8px}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
a{color:var(--cyan)}
.wrap{max-width:1280px;margin:0 auto;padding:0 1rem}
header{padding:1.25rem 0;border-bottom:1px solid var(--border)}
header h1{font-size:1.35rem;font-weight:700;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.badge{font-size:.7rem;padding:2px 8px;border-radius:99px;background:var(--surface);border:1px solid var(--border);color:var(--text-sec)}
.subtitle{color:var(--text-sec);font-size:.8rem;margin-top:.2rem}
.tabs{display:flex;gap:2px;overflow-x:auto;border-bottom:1px solid var(--border);margin:.75rem 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs button{background:none;border:none;color:var(--text-sec);padding:.5rem .75rem;font:inherit;font-size:.78rem;cursor:pointer;
  white-space:nowrap;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.tabs button:hover,.tabs button:focus-visible{color:var(--text)}
.tabs button[aria-selected="true"]{color:var(--cyan);border-bottom-color:var(--cyan)}
.tabs button:focus-visible{outline:2px solid var(--cyan);outline-offset:-2px;border-radius:4px 4px 0 0}
.tab-panel{display:none;padding:.75rem 0}
.tab-panel.active{display:block}
.grid{display:grid;gap:.75rem;grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
.grid-wide{display:grid;gap:.75rem;grid-template-columns:repeat(2,1fr)}
.grid-full{display:grid;gap:.75rem;grid-template-columns:1fr}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem;overflow:hidden}
.card h3{font-size:.72rem;color:var(--text-sec);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.5rem}
.card-full{grid-column:1/-1}
.metric{text-align:center;padding:.5rem .25rem}
.metric .value{font-family:'JetBrains Mono',monospace;font-size:1.25rem;font-weight:600}
.metric .label{font-size:.68rem;color:var(--text-sec);margin-top:.15rem}
.chart-wrap{position:relative;width:100%;height:220px}
.chart-wrap-sm{height:180px}
.chart-wrap-lg{height:280px}
.section-title{font-size:.85rem;font-weight:600;color:var(--text);margin:1rem 0 .5rem;padding-bottom:.25rem;border-bottom:1px solid var(--border)}
table.bench-table{width:100%;border-collapse:collapse;font-size:.82rem}
table.bench-table th{text-align:left;color:var(--text-sec);font-weight:600;padding:.5rem .75rem;border-bottom:2px solid var(--border);font-size:.78rem;position:sticky;top:0;background:var(--surface);z-index:1}
table.bench-table td{padding:.4rem .75rem;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:.78rem}
table.bench-table tr:hover{background:rgba(0,229,204,.06)}
table.bench-table .group-header td{background:var(--bg);color:var(--cyan);font-family:'Space Grotesk',system-ui,sans-serif;font-weight:600;font-size:.78rem;padding:.6rem .75rem;border-bottom:1px solid var(--border);letter-spacing:.02em}
.table-scroll{max-height:600px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
.search-box{width:100%;padding:.5rem .75rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text);font:inherit;font-size:.85rem;margin-bottom:.75rem}
.search-box::placeholder{color:var(--text-muted)}
.result-count{font-size:.75rem;color:var(--text-muted);margin-bottom:.5rem}
footer{border-top:1px solid var(--border);padding:1rem 0;margin-top:1.5rem;color:var(--text-muted);font-size:.7rem;text-align:center}
@media(max-width:640px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .grid-wide{grid-template-columns:1fr}
  header h1{font-size:1.1rem}
  .metric .value{font-size:1rem}
  .chart-wrap{height:180px}
  .chart-wrap-sm{height:160px}
  .chart-wrap-lg{height:220px}
  .tabs button{padding:.4rem .5rem;font-size:.72rem}
  .table-scroll{max-height:500px}
  table.bench-table{font-size:.72rem}
  table.bench-table td,table.bench-table th{padding:.35rem .5rem}
}
@media(min-width:641px) and (max-width:1024px){
  .grid-wide{grid-template-columns:repeat(2,1fr)}
}
</style>

function fmt(v,unit){if(v==null||v===DASH)return DASH;const n=Number(v);if(isNaN(n)||n===0)return DASH;
  if(unit==="ns"){if(n>=1e6)return (n/1e6).toFixed(2)+" ms";if(n>=1e3)return (n/1e3).toFixed(1)+" \u00b5s";return n.toFixed(0)+" ns";}
  return n<0.01?n.toFixed(4)+(unit||""):n<1?n.toFixed(3)+(unit||""):n<100?n.toFixed(2)+(unit||""):n.toFixed(1)+(unit||"");}

function metricBox(label,value,unit,color){

const TABS=[
  {id:"overview",label:"Overview"},
  {id:"transport",label:"Transport"},
  {id:"serde",label:"Serde"},
  {id:"concurrency",label:"Concurrency"},
  {id:"scale",label:"Data Volume"},

function initTabs(){
  var tl=$("#tablist"),pn=$("#panels");
  TABS.forEach(function(t,i){
    var btn=el("button","",t.label);
    btn.setAttribute("role","tab");btn.setAttribute("aria-selected",i===0?"true":"false");
    btn.setAttribute("aria-controls","panel-"+t.id);btn.id="tab-"+t.id;btn.tabIndex=i===0?0:-1;
    btn.addEventListener("click",function(){activate(t.id)});
    tl.appendChild(btn);
    var panel=el("div","tab-panel"+(i===0?" active":""));
    panel.id="panel-"+t.id;panel.setAttribute("role","tabpanel");
    panel.setAttribute("aria-labelledby","tab-"+t.id);
    if(i!==0)panel.setAttribute("hidden","");
    pn.appendChild(panel);
  });
  tl.addEventListener("keydown",function(e){
    var keys=["ArrowLeft","ArrowRight","Home","End"];if(keys.indexOf(e.key)===-1)return;
    e.preventDefault();var btns=Array.from(tl.querySelectorAll("[role=tab]"));
    var idx=btns.findIndex(function(b){return b.getAttribute("aria-selected")==="true"});
    if(e.key==="ArrowRight")idx=(idx+1)%btns.length;
    else if(e.key==="ArrowLeft")idx=(idx-1+btns.length)%btns.length;
    else if(e.key==="Home")idx=0;else idx=btns.length-1;
    activate(TABS[idx].id);btns[idx].focus();
  });
}
function activate(id){
  document.querySelectorAll("[role=tab]").forEach(function(b){b.setAttribute("aria-selected","false");b.tabIndex=-1});
  document.querySelectorAll(".tab-panel").forEach(function(p){p.classList.remove("active");p.setAttribute("hidden","")});
  var tab=$("#tab-"+id);tab.setAttribute("aria-selected","true");tab.tabIndex=0;
  var panel=$("#panel-"+id);panel.classList.add("active");panel.removeAttribute("hidden");
}

  g.appendChild(metricBox("Serialize (cross-lang)",safe(function(){return cl.serialize_ns}),"ns",C.slate));
  p.appendChild(g);

  var pc=safe(function(){return pr.push_config},{});
  if(pc.set_us||pc.get_us){
    var g2=el("div","grid");g2.style.marginTop=".5rem";
    g2.appendChild(metricBox("Push config set",safe(function(){return pc.set_us}),"\u00b5s",C.cyan));
    g2.appendChild(metricBox("Push config get",safe(function(){return pc.get_us}),"\u00b5s",C.green));
    g2.appendChild(metricBox("Push config list",safe(function(){return pc.list_us}),"\u00b5s",C.amber));
    g2.appendChild(metricBox("Push config delete",safe(function(){return pc.delete_us}),"\u00b5s",C.rose));
    p.appendChild(g2);
  }

  var gw=el("div","grid-wide");gw.style.marginTop=".75rem";
  var ab=safe(function(){return pr.agent_burst},[]);
  if(ab.length){
    var r=chartCard("Agent Burst Scaling","chart-wrap-sm");
    lineChart(r.canvas,ab.map(function(x){return x.agents+" agents"}),[{label:"ms",data:ab.map(function(x){return x.ms}),color:C.cyan}],{yLabel:"ms"});
    gw.appendChild(r.card);
  }
  if(cl.echo_roundtrip_ms||cl.serialize_ns){
    var r2=chartCard("Cross-Language Baselines (Rust)","chart-wrap-sm");
    var clLabels=["Echo RT","Stream","Concurrent 50","Minimal"];
    var clData=[safe(function(){return cl.echo_roundtrip_ms},0),safe(function(){return cl.stream_events_ms},0),
      safe(function(){return cl.concurrent_50_ms},0),
      safe(function(){return cl.minimal_overhead_ms},0)];
    barChart(r2.canvas,clLabels,[{label:"ms",data:clData,color:C.green}],{yLabel:"ms"});
    gw.appendChild(r2.card);
  }
  p.appendChild(gw);
}

/* --- Memory --- */
function buildMemory(p){
  var mem=D.memory||{};
  var at=safe(function(){return mem.alloc_timing},{});
  var g=el("div","grid");
  g.appendChild(metricBox("Task ser timing",safe(function(){return at.task_ser}),"ns",C.cyan));
  g.appendChild(metricBox("Task de timing",safe(function(){return at.task_de}),"ns",C.amber));
  g.appendChild(metricBox("AgentCard ser timing",safe(function(){return at.agent_card_ser}),"ns",C.green));
  g.appendChild(metricBox("AgentCard de timing",safe(function(){return at.agent_card_de}),"ns",C.rose));
  p.appendChild(g);

  var gw=el("div","grid-wide");gw.style.marginTop=".75rem";
  var bp=safe(function(){return mem.bytes_per_payload},[]);
  if(bp.length){
    var r=chartCard("Serialize Timing by Payload Size","chart-wrap-sm");
    barChart(r.canvas,bp.map(function(x){return x.payload}),[{label:"ns",data:bp.map(function(x){return x.bytes}),color:C.violet}],{yLabel:"ns"});
    gw.appendChild(r.card);
  }
  var ha=safe(function(){return mem.history_allocs},[]);
  if(ha.length){
    var r2=chartCard("History Serde Timing by Depth","chart-wrap-sm");
    lineChart(r2.canvas,ha.map(function(x){return x.turns+" turns"}),[
      {label:"Serialize (ns)",data:ha.map(function(x){return x.ser}),color:C.cyan},
      {label:"Deserialize (ns)",data:ha.map(function(x){return x.de}),color:C.rose}
    ],{yLabel:"ns"});
    gw.appendChild(r2.card);
  }
  p.appendChild(gw);
}

/* --- All Results --- */
function buildAll(p){
  var all=safe(function(){return D.all_benchmarks},[]);
  if(!all.length){p.appendChild(el("p","","No benchmark data available."));return}

  var box=el("input","search-box");box.type="text";box.placeholder="Filter by name (e.g. transport, serde, enterprise)...";
  box.setAttribute("aria-label","Filter benchmarks");
  p.appendChild(box);

  var countEl=el("div","result-count","Showing "+all.length+" of "+all.length+" benchmarks");
  p.appendChild(countEl);

  var scroll=el("div","table-scroll");
  var tbl=el("table","bench-table");
  tbl.innerHTML='<thead><tr><th style="width:55%">Benchmark</th><th style="text-align:right;width:15%">Median</th><th style="text-align:right;width:15%">Lower CI</th><th style="text-align:right;width:15%">Upper CI</th></tr></thead>';
  var tbody=el("tbody","");

  function fmtNs(ns){if(ns<=0)return DASH;if(ns>=1e6)return(ns/1e6).toFixed(2)+" ms";if(ns>=1e3)return(ns/1e3).toFixed(1)+" \u00b5s";return ns.toFixed(0)+" ns";}

  var lastGroup="";
  all.forEach(function(b){
    var group=b.name.split("/")[0];
    if(group!==lastGroup){
      var gh=el("tr","group-header");
      gh.innerHTML='<td colspan="4">'+group.replace(/_/g," ")+'</td>';
      tbody.appendChild(gh);
      lastGroup=group;
    }
    var shortName=b.name.substring(b.name.indexOf("/")+1);
    var tr=el("tr","");
    tr.setAttribute("data-name",b.name);
    tr.innerHTML='<td style="padding-left:1.5rem">'+shortName+'</td><td style="text-align:right">'+fmtNs(b.median_ns)+'</td><td style="text-align:right;color:var(--text-sec)">'+fmtNs(b.lower_ns)+'</td><td style="text-align:right;color:var(--text-sec)">'+fmtNs(b.upper_ns)+'</td>';
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);scroll.appendChild(tbl);p.appendChild(scroll);

  box.addEventListener("input",function(){
    var q=box.value.toLowerCase();
    var visible=0;
    var visibleGroups={};
    Array.from(tbody.querySelectorAll("tr:not(.group-header)")).forEach(function(tr){
      var name=tr.getAttribute("data-name")||"";
      var show=name.toLowerCase().indexOf(q)!==-1;
      tr.style.display=show?"":"none";
      if(show){visible++;visibleGroups[name.split("/")[0]]=true;}
    });
    Array.from(tbody.querySelectorAll("tr.group-header")).forEach(function(tr){
      var groupName=tr.textContent.trim().replace(/ /g,"_");
      tr.style.display=visibleGroups[groupName]?"":"none";
    });
    countEl.textContent="Showing "+visible+" of "+all.length+" benchmarks";
  });
}

/* --- Init --- */
var builders={overview:buildOverview,transport:buildTransport,serde:buildSerde,
  concurrency:buildConcurrency,scale:buildScale,backpressure:buildBackpressure,
  enterprise:buildEnterprise,production:buildProduction,memory:buildMemory,all:buildAll};

function init(){
  try{
    var m=D.metadata||{};
    var hv=$("#hdr-version");if(hv)hv.textContent=safe(function(){return m.rust_version},"");
    var hc=$("#hdr-count");if(hc)hc.textContent=safe(function(){return m.total_benchmarks+" benchmarks"},"");
    var hm=$("#hdr-meta");if(hm)hm.textContent=[safe(function(){return m.platform},""),safe(function(){return m.timestamp},"")].filter(Boolean).join(" \u00b7 ");
    initTabs();
    TABS.forEach(function(t){var panel=$("#panel-"+t.id);if(panel&&builders[t.id])builders[t.id](panel)});
  }catch(err){
    document.body.innerHTML='<div style="padding:2rem;color:#ff6b8a;font-family:monospace"><h2>Dashboard Error</h2><pre>'+(err.stack||err)+'</pre></div>';
  }
}
if(typeof D==="object")init();
else document.body.innerHTML='<p style="padding:2rem;color:var(--text-sec)">No benchmark data loaded.</p>';

</script>
</body>
</html>
