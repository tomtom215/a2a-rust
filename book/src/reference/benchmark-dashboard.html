<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0c0e;--surface:#141417;--border:#232329;--cyan:#00e5cc;--amber:#f5a623;
--green:#00d68f;--rose:#ff6b8a;--violet:#b18cfe;--blue:#5b9cf6;--text:#eaeaed;
--text-sec:#9898a4;--text-muted:#56565f;--radius:8px}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
a{color:var(--cyan)}
/* Layout */
.wrap{max-width:1280px;margin:0 auto;padding:0 1rem}
header{padding:1.5rem 0;border-bottom:1px solid var(--border)}
header h1{font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.badge{font-size:.75rem;padding:2px 8px;border-radius:99px;background:var(--surface);border:1px solid var(--border);color:var(--text-sec)}
.subtitle{color:var(--text-sec);font-size:.85rem;margin-top:.25rem}
/* Tabs */
.tabs{display:flex;gap:2px;overflow-x:auto;border-bottom:1px solid var(--border);margin:1rem 0;-webkit-overflow-scrolling:touch}
.tabs button{background:none;border:none;color:var(--text-sec);padding:.6rem 1rem;font:inherit;font-size:.85rem;cursor:pointer;
  white-space:nowrap;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.tabs button:hover,.tabs button:focus-visible{color:var(--text)}
.tabs button[aria-selected="true"]{color:var(--cyan);border-bottom-color:var(--cyan)}
.tabs button:focus-visible{outline:2px solid var(--cyan);outline-offset:-2px;border-radius:4px 4px 0 0}
.tab-panel{display:none;padding:1rem 0}
.tab-panel.active{display:block}
/* Grid */
.grid{display:grid;gap:1rem;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.grid-wide{grid-template-columns:repeat(auto-fill,minmax(360px,1fr))}
/* Cards & Metrics */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;overflow:hidden}
.card h3{font-size:.8rem;color:var(--text-sec);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.75rem}
.metric{text-align:center;padding:.75rem .5rem}
.metric .value{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:600}
.metric .label{font-size:.75rem;color:var(--text-sec);margin-top:.25rem}
.metric-sm .value{font-size:1.1rem}
.chart-wrap{position:relative;width:100%;aspect-ratio:16/10}
/* Footer */
footer{border-top:1px solid var(--border);padding:1.5rem 0;margin-top:2rem;color:var(--text-muted);font-size:.75rem;text-align:center}
/* Responsive */
@media(max-width:640px){
  .grid,.grid-wide{grid-template-columns:1fr}
  header h1{font-size:1.2rem}
  .metric .value{font-size:1.3rem}
}
</style>
</head>

function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e}
function fmt(v,unit){if(v==null||v===DASH)return DASH;const n=Number(v);if(isNaN(n))return DASH;return n<1?n.toFixed(3)+unit:n<100?n.toFixed(2)+unit:n.toFixed(1)+unit}

}

    borderRadius:3,maxBarThickness:40,...(ds.extra||{})
  }))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:datasets.length>1}},
    scales:{y:{beginAtZero:true,title:{display:!!(opts&&opts.yLabel),text:(opts&&opts.yLabel)||""},grid:{color:"#232329"}},
      x:{grid:{display:false}}},...(opts||{})}});
}
function lineChart(canvas,labels,datasets,opts){
  return new Chart(canvas,{type:"line",data:{labels,datasets:datasets.map((ds,i)=>({
    label:ds.label,data:ds.data,borderColor:ds.color||COLOR_LIST[i%COLOR_LIST.length],
    backgroundColor:"transparent",tension:.3,pointRadius:3,borderWidth:2,...(ds.extra||{})
  }))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:datasets.length>1}},
    scales:{y:{beginAtZero:true,title:{display:!!(opts&&opts.yLabel),text:(opts&&opts.yLabel)||""},grid:{color:"#232329"}},
      x:{grid:{display:false}}},...(opts||{})}});
}

/* --- Tabs --- */
const TABS=[
  {id:"overview",label:"Overview"},
  {id:"transport",label:"Transport & Concurrency"},
  {id:"serde",label:"Serde & Protocol"},
  {id:"scale",label:"Data Volume"},
  {id:"enterprise",label:"Enterprise"},
  {id:"production",label:"Production"},
  {id:"memory",label:"Memory"}
];
function initTabs(){
  const tl=$("#tablist"),pn=$("#panels");
  TABS.forEach((t,i)=>{
    const btn=el("button","",t.label);
    btn.setAttribute("role","tab");btn.setAttribute("aria-selected",i===0?"true":"false");
    btn.setAttribute("aria-controls","panel-"+t.id);btn.id="tab-"+t.id;btn.tabIndex=i===0?0:-1;
    btn.addEventListener("click",()=>activate(t.id));
    tl.appendChild(btn);
    const panel=el("div","tab-panel"+(i===0?" active":""));
    panel.id="panel-"+t.id;panel.setAttribute("role","tabpanel");
    panel.setAttribute("aria-labelledby","tab-"+t.id);
    if(i!==0)panel.setAttribute("hidden","");
    pn.appendChild(panel);
  });
  tl.addEventListener("keydown",e=>{
    const keys=["ArrowLeft","ArrowRight","Home","End"];if(!keys.includes(e.key))return;
    e.preventDefault();const btns=[...tl.querySelectorAll("[role=tab]")];
    let idx=btns.findIndex(b=>b.getAttribute("aria-selected")==="true");
    if(e.key==="ArrowRight")idx=(idx+1)%btns.length;
    else if(e.key==="ArrowLeft")idx=(idx-1+btns.length)%btns.length;
    else if(e.key==="Home")idx=0;else idx=btns.length-1;
    activate(TABS[idx].id);btns[idx].focus();
  });
}
function activate(id){
  document.querySelectorAll("[role=tab]").forEach(b=>{b.setAttribute("aria-selected","false");b.tabIndex=-1});
  document.querySelectorAll(".tab-panel").forEach(p=>{p.classList.remove("active");p.setAttribute("hidden","")});
  const tab=$("#tab-"+id);tab.setAttribute("aria-selected","true");tab.tabIndex=0;
  const panel=$("#panel-"+id);panel.classList.add("active");panel.removeAttribute("hidden");
}

/* --- Tab Builders --- */
function buildOverview(p){
  const h=D.highlights||{},m=D.metadata||{},err=D.errors||{},lc=D.lifecycle||{},cl=D.cross_language||{};
  const g=el("div","grid");
  g.appendChild(metricBox("Serde floor",safe(()=>h.serde_floor_ns),"ns",COLORS.cyan));
  g.appendChild(metricBox("Roundtrip (reused)",safe(()=>h.roundtrip_reused_ms),"ms",COLORS.green));
  g.appendChild(metricBox("64-conn sends",safe(()=>h.concurrent_64_sends_ms),"ms",COLORS.amber));
  g.appendChild(metricBox("Single send",safe(()=>h.concurrent_1_send_ms),"ms",COLORS.blue));
  g.appendChild(metricBox("Happy path",safe(()=>err.happy_path_ms||h.happy_path_ms),"ms",COLORS.green));
  g.appendChild(metricBox("Error path",safe(()=>err.error_path_ms||h.error_path_ms),"ms",COLORS.rose));
  g.appendChild(metricBox("Agent burst (100)",safe(()=>h.agent_burst_100_ms),"ms",COLORS.violet));
  g.appendChild(metricBox("Send complete",safe(()=>lc.send_complete_ms),"ms",COLORS.cyan));
  g.appendChild(metricBox("Stream drain",safe(()=>lc.stream_drain_ms),"ms",COLORS.amber));
  g.appendChild(metricBox("Echo roundtrip",safe(()=>cl.echo_roundtrip_ms),"ms",COLORS.green));
  p.appendChild(g);
  // payload scaling overview chart
  const ps=safe(()=>D.transport.payload_scaling,[]);
  if(ps.length){const{card:c,canvas:cv}=chartCard("Payload Scaling (transport)");
    lineChart(cv,ps.map(r=>r.size),[{label:"ms",data:ps.map(r=>r.ms),color:COLORS.cyan}],{yLabel:"ms"});
    const w=el("div","grid-wide");w.style.marginTop="1rem";w.appendChild(c);p.appendChild(w)}
}

function buildTransport(p){
  const t=D.transport||{},cr=D.connection_reuse||{},con=D.concurrency||[];
  // Transport latencies
  const g=el("div","grid");
  g.appendChild(metricBox("JSON-RPC send",safe(()=>t.jsonrpc_send_ms),"ms",COLORS.cyan));
  g.appendChild(metricBox("JSON-RPC stream",safe(()=>t.jsonrpc_stream_ms),"ms",COLORS.green));
  g.appendChild(metricBox("REST send",safe(()=>t.rest_send_ms),"ms",COLORS.amber));
  g.appendChild(metricBox("REST stream",safe(()=>t.rest_stream_ms),"ms",COLORS.rose));
  g.appendChild(metricBox("Conn reused",safe(()=>cr.reused_ms),"ms",COLORS.green));
  g.appendChild(metricBox("Conn new/req",safe(()=>cr.new_per_request_ms),"ms",COLORS.rose));
  p.appendChild(g);
  // Concurrency chart
  if(con.length){
    const{card:c,canvas:cv}=chartCard("Concurrency Scaling");
    barChart(cv,con.map(r=>r.c+"c"),[
      {label:"Sends",data:con.map(r=>r.sends),color:COLORS.cyan},
      {label:"Streams",data:con.map(r=>r.streams),color:COLORS.amber},
      {label:"Store",data:con.map(r=>r.store),color:COLORS.violet}
    ],{yLabel:"ms"});
    const w=el("div","grid-wide");w.style.marginTop="1rem";w.appendChild(c);p.appendChild(w);
  }
}

function buildSerde(p){
  const s=D.serde||{};
  // Type-level serde
  const types=safe(()=>s.types,[]);
  if(types.length){const{card:c,canvas:cv}=chartCard("Serde by Type (ns)");
    barChart(cv,types.map(r=>r.type),[{label:"ns",data:types.map(r=>r.ns),color:COLORS.cyan}],{yLabel:"ns"});
    p.appendChild(c);c.style.marginBottom="1rem";}
  // Batch
  const batch=safe(()=>s.batch,[]);
  if(batch.length){const{card:c,canvas:cv}=chartCard("Batch Serde");
    barChart(cv,batch.map(r=>"n="+r.count),[
      {label:"Serialize (us)",data:batch.map(r=>r.ser_us),color:COLORS.green},
      {label:"Deserialize (us)",data:batch.map(r=>r.de_us),color:COLORS.rose}
    ],{yLabel:"\u00b5s"});p.appendChild(c);c.style.marginBottom="1rem";}
  // Interceptors
  const ic=safe(()=>s.interceptors,[]);
  if(ic.length){const{card:c,canvas:cv}=chartCard("Interceptor Chain");
    lineChart(cv,ic.map(r=>r.n),[{label:"\u00b5s",data:ic.map(r=>r.us),color:COLORS.violet}],{yLabel:"\u00b5s"});
    p.appendChild(c);c.style.marginBottom="1rem";}
  // Payload scaling
  const ps=safe(()=>s.payload_scaling,[]);
  if(ps.length){const{card:c,canvas:cv}=chartCard("Payload Serde Scaling");
    lineChart(cv,ps.map(r=>r.size),[
      {label:"to_vec (ns)",data:ps.map(r=>r.to_vec_ns),color:COLORS.cyan},
      {label:"ser_buffer (ns)",data:ps.map(r=>r.ser_buffer_ns),color:COLORS.green},
      {label:"from_slice (ns)",data:ps.map(r=>r.from_slice_ns),color:COLORS.amber},
      {label:"from_str (ns)",data:ps.map(r=>r.from_str_ns),color:COLORS.rose}
    ],{yLabel:"ns"});p.appendChild(c);}
}

function buildScale(p){
  const dv=D.data_volume||{},bp=D.backpressure||{};
  const g=el("div","grid-wide");
  // Get
  const gd=safe(()=>dv.get,[]);
  if(gd.length){const{card:c,canvas:cv}=chartCard("Get by Volume");
    barChart(cv,gd.map(r=>r.volume),[{label:"ns",data:gd.map(r=>r.ns),color:COLORS.cyan}],{yLabel:"ns"});g.appendChild(c);}
  // List
  const ld=safe(()=>dv.list,[]);
  if(ld.length){const{card:c,canvas:cv}=chartCard("List by Volume");
    barChart(cv,ld.map(r=>r.volume),[{label:"\u00b5s",data:ld.map(r=>r.us),color:COLORS.amber}],{yLabel:"\u00b5s"});g.appendChild(c);}
  // Save
  const sd=safe(()=>dv.save,[]);
  if(sd.length){const{card:c,canvas:cv}=chartCard("Save (prefill)");
    barChart(cv,sd.map(r=>r.prefill),[{label:"\u00b5s",data:sd.map(r=>r.us),color:COLORS.green}],{yLabel:"\u00b5s"});g.appendChild(c);}
  // History depth
  const hd=safe(()=>dv.history_depth,[]);
  if(hd.length){const{card:c,canvas:cv}=chartCard("History Depth");
    lineChart(cv,hd.map(r=>r.turns),[{label:"\u00b5s",data:hd.map(r=>r.us),color:COLORS.violet}],{yLabel:"\u00b5s"});g.appendChild(c);}
  p.appendChild(g);
  // Backpressure stream volume
  const sv=safe(()=>bp.stream_volume,[]);
  if(sv.length){const{card:c,canvas:cv}=chartCard("Stream Volume (backpressure)");
    lineChart(cv,sv.map(r=>r.events),[{label:"ms",data:sv.map(r=>r.ms),color:COLORS.rose}],{yLabel:"ms"});
    c.style.marginTop="1rem";p.appendChild(c);}
}

function buildEnterprise(p){
  const e=D.enterprise||{},adv=D.advanced||{};
  const g=el("div","grid");

  const gw=el("div","grid-wide");gw.style.marginTop="1rem";

    barChart(cv,ti.map(r=>r.tenants+"t"),[{label:"ns",data:ti.map(r=>r.ns),color:COLORS.cyan}],{yLabel:"ns"});gw.appendChild(c);}
  // R/W mix

  const mem=D.memory||{};

  g.appendChild(metricBox("Task ser allocs",safe(()=>ac.task_ser),"",COLORS.cyan));
  g.appendChild(metricBox("Task de allocs",safe(()=>ac.task_de),"",COLORS.amber));

  g.appendChild(metricBox("AgentCard de",safe(()=>ac.agent_card_de),"",COLORS.rose));

/* --- Init --- */
const builders={overview:buildOverview,transport:buildTransport,serde:buildSerde,
  scale:buildScale,enterprise:buildEnterprise,production:buildProduction,memory:buildMemory};

function init(){
  try{
    const m=D.metadata||{};
    const hv=$("#hdr-version");if(hv)hv.textContent=safe(()=>m.rust_version,"");
    const hc=$("#hdr-count");if(hc)hc.textContent=safe(()=>m.total_benchmarks+" benchmarks","");
    const hm=$("#hdr-meta");if(hm)hm.textContent=[safe(()=>m.platform,""),safe(()=>m.timestamp,"")].filter(Boolean).join(" \u00b7 ");
    initTabs();
    TABS.forEach(t=>{const panel=$("#panel-"+t.id);if(panel&&builders[t.id])builders[t.id](panel)});
  }catch(err){
    document.body.innerHTML=`<div style="padding:2rem;color:#ff6b8a;font-family:monospace"><h2>Dashboard Error</h2><pre>${err.stack||err}</pre></div>`;
  }
}
if(typeof D==="object")init();
else document.body.innerHTML='<p style="padding:2rem;color:var(--text-sec)">No benchmark data loaded. Build with: <code>cargo bench --features dashboard</code></p>';
</script>
