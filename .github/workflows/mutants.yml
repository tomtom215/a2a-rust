#
# Mutation testing — verifies that tests actually detect code changes.
#
# Runs cargo-mutants on all library crates and fails if any mutant survives.
# Scheduled nightly + on-demand; also runs on PRs to main (incremental).
#
# Architecture:
#   - Full sweep splits into 4 parallel jobs (one per library crate) to avoid
#     the 120-minute GitHub Actions timeout.  a2a-server alone can take 100+
#     minutes when run sequentially.
#   - A lightweight aggregation job merges per-crate reports and produces the
#     combined score.
#   - Incremental mode (PRs) tests only changed files in a single job.
#
# CI output is optimised for readability:
#   - cargo-mutants raw output is captured to a file (not streamed to the log)
#   - GitHub Actions log groups collapse noisy sections
#   - A structured summary with per-crate breakdown is written to GITHUB_STEP_SUMMARY
#   - Timeouts are tracked and surfaced separately from missed mutants
#   - Only actionable information (surviving mutants + how to fix) appears un-collapsed

name: Mutation Testing

on:
  # On-demand only — nightly schedule and PR gate disabled to save CI time.
  # Re-enable schedule and pull_request triggers when iteration stabilises.
  #
  # schedule:
  #   - cron: "0 3 * * *" # 03:00 UTC daily
  # pull_request:
  #   branches: ["main"]
  workflow_dispatch:
    inputs:
      package:
        description: "Specific package to test (blank = all 4 crates in parallel)"
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Per-crate mutation sweep (parallel) ──────────────────────────────────────
  #
  # Splits the workspace into 4 parallel runners — one per library crate.
  # This avoids the 120-minute timeout that the monolithic --workspace run hit,
  # since a2a-server alone can generate 200-400 mutants at ~90s each.
  #
  # When a specific package is provided via workflow_dispatch, only that
  # package's job runs (the others are skipped via the `if` condition).
  mutants-crate:
    name: "Mutants (${{ matrix.crate }})"
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false   # Don't cancel other crates if one fails
      matrix:
        include:
          - crate: a2a-protocol-types
            short: a2a-types
          - crate: a2a-protocol-client
            short: a2a-client
          - crate: a2a-protocol-server
            short: a2a-server
          - crate: a2a-protocol-sdk
            short: a2a-sdk
    steps:
      # Skip this matrix entry if a specific package was requested and it
      # doesn't match this crate.
      - name: Check if this crate should run
        id: check
        run: |
          INPUT_PKG="${{ inputs.package }}"
          if [ -n "$INPUT_PKG" ] && [ "$INPUT_PKG" != "${{ matrix.crate }}" ] && [ "$INPUT_PKG" != "${{ matrix.short }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.crate }} — user requested '$INPUT_PKG'"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        if: steps.check.outputs.skip == 'false'

      - uses: dtolnay/rust-toolchain@stable
        if: steps.check.outputs.skip == 'false'

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        if: steps.check.outputs.skip == 'false'

      - name: Install protoc (for gRPC feature)
        if: steps.check.outputs.skip == 'false'
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-mutants
        if: steps.check.outputs.skip == 'false'
        run: cargo install cargo-mutants

      # ── Run mutants for this crate ───────────────────────────────────────
      - name: "Run mutation tests: ${{ matrix.crate }}"
        id: mutants
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "::group::cargo-mutants execution log (${{ matrix.crate }})"

          set +e
          cargo mutants -p ${{ matrix.crate }} \
            --output mutants.out \
            --timeout 120 \
            --jobs 4 \
            -- --all-features 2>&1 | tee /tmp/mutants-run.log
          MUTANTS_EXIT=$?
          set -e

          echo "::endgroup::"
          echo "exit_code=${MUTANTS_EXIT}" >> "$GITHUB_OUTPUT"

      # ── Per-crate report ─────────────────────────────────────────────────
      - name: Generate per-crate report
        if: always() && steps.check.outputs.skip == 'false'
        run: |
          count() { if [ -f "$1" ]; then grep -c . "$1" 2>/dev/null || echo 0; else echo 0; fi; }

          CAUGHT=$(count mutants.out/caught.txt)
          MISSED=$(count mutants.out/missed.txt)
          UNVIABLE=$(count mutants.out/unviable.txt)
          TIMEOUT=$(count mutants.out/timeout.txt)
          TOTAL=$((CAUGHT + MISSED))

          if [ "$TOTAL" -gt 0 ]; then
            SCORE=$(( (CAUGHT * 100) / TOTAL ))
          else
            SCORE=100
          fi

          {
            echo "# Mutation Testing: \`${{ matrix.short }}\`"
            echo ""
            echo "## Score: ${SCORE}%"
            echo ""
            echo "| Outcome | Count |"
            echo "|---------|------:|"
            echo "| Caught | ${CAUGHT} |"
            echo "| Missed | ${MISSED} |"
            echo "| Timeout | ${TIMEOUT} |"
            echo "| Unviable | ${UNVIABLE} |"
            echo ""

            if [ "$MISSED" -gt 0 ]; then
              echo "## Surviving Mutants"
              echo ""
              echo '```'
              cat mutants.out/missed.txt
              echo '```'
              echo ""
            fi

            if [ "$TIMEOUT" -gt 0 ]; then
              echo "## Timed-Out Mutants"
              echo ""
              echo '```'
              cat mutants.out/timeout.txt
              echo '```'
              echo ""
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Console summary
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " ${{ matrix.short }}: SCORE ${SCORE}%"
          echo " Caught: ${CAUGHT}  Missed: ${MISSED}  Timeout: ${TIMEOUT}  Unviable: ${UNVIABLE}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$MISSED" -gt 0 ]; then
            echo ""
            echo "::error::${MISSED} mutant(s) survived in ${{ matrix.short }}:"
            while IFS= read -r line; do
              FILE=$(echo "$line" | cut -d: -f1)
              LINE=$(echo "$line" | cut -d: -f2)
              MSG=$(echo "$line" | cut -d: -f3-)
              if [ -n "$FILE" ] && [ -n "$LINE" ]; then
                echo "::error file=${FILE},line=${LINE}::SURVIVED:${MSG}"
              else
                echo "  $line"
              fi
            done < mutants.out/missed.txt
            exit 1
          fi

      - name: Upload per-crate report
        if: always() && steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mutation-report-${{ matrix.short }}
          path: |
            mutants.out/
            /tmp/mutants-run.log
          retention-days: 30

  # ── Aggregation job ──────────────────────────────────────────────────────────
  #
  # Merges all per-crate reports into a single combined summary.  Fails if any
  # crate had surviving mutants.
  mutants-summary:
    name: "Mutants Summary"
    needs: mutants-crate
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download all per-crate reports
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: mutation-report-*
          path: reports/

      - name: Aggregate results
        run: |
          count() { if [ -f "$1" ]; then grep -c . "$1" 2>/dev/null || echo 0; else echo 0; fi; }

          TOTAL_CAUGHT=0
          TOTAL_MISSED=0
          TOTAL_TIMEOUT=0
          TOTAL_UNVIABLE=0

          {
            echo "# Mutation Testing Report (combined)"
            echo ""
            echo "| Crate | Caught | Missed | Timeout | Score |"
            echo "|-------|-------:|-------:|--------:|------:|"
          } > /tmp/summary.md

          for CRATE_DIR in reports/mutation-report-*/; do
            if [ ! -d "$CRATE_DIR" ]; then continue; fi
            CRATE_NAME=$(basename "$CRATE_DIR" | sed 's/mutation-report-//')

            C=$(count "${CRATE_DIR}mutants.out/caught.txt")
            M=$(count "${CRATE_DIR}mutants.out/missed.txt")
            T=$(count "${CRATE_DIR}mutants.out/timeout.txt")
            U=$(count "${CRATE_DIR}mutants.out/unviable.txt")
            CRATE_TOTAL=$((C + M))

            if [ "$CRATE_TOTAL" -gt 0 ]; then
              CS=$(( (C * 100) / CRATE_TOTAL ))
            else
              CS=100
            fi

            echo "| \`${CRATE_NAME}\` | ${C} | ${M} | ${T} | ${CS}% |" >> /tmp/summary.md

            TOTAL_CAUGHT=$((TOTAL_CAUGHT + C))
            TOTAL_MISSED=$((TOTAL_MISSED + M))
            TOTAL_TIMEOUT=$((TOTAL_TIMEOUT + T))
            TOTAL_UNVIABLE=$((TOTAL_UNVIABLE + U))
          done

          GRAND_TOTAL=$((TOTAL_CAUGHT + TOTAL_MISSED))
          if [ "$GRAND_TOTAL" -gt 0 ]; then
            SCORE=$(( (TOTAL_CAUGHT * 100) / GRAND_TOTAL ))
          else
            SCORE=100
          fi

          # Prepend overall score
          {
            head -2 /tmp/summary.md
            echo "## Overall Score: ${SCORE}%"
            echo ""
            echo "| Outcome | Count |"
            echo "|---------|------:|"
            echo "| Caught | ${TOTAL_CAUGHT} |"
            echo "| Missed | ${TOTAL_MISSED} |"
            echo "| Timeout | ${TOTAL_TIMEOUT} |"
            echo "| Unviable | ${TOTAL_UNVIABLE} |"
            echo ""
            tail -n +3 /tmp/summary.md
          } > /tmp/final-summary.md

          # Append surviving mutants from all crates
          if [ "$TOTAL_MISSED" -gt 0 ]; then
            {
              echo ""
              echo "## Surviving Mutants (all crates)"
              echo ""
              echo '```'
              cat reports/mutation-report-*/mutants.out/missed.txt 2>/dev/null || true
              echo '```'
              echo ""
              echo "## How to Fix"
              echo ""
              echo '```bash'
              echo "cargo install cargo-mutants"
              echo "cargo mutants -p <crate-name> -- --all-features"
              echo '```'
            } >> /tmp/final-summary.md
          fi

          cat /tmp/final-summary.md >> "$GITHUB_STEP_SUMMARY"

          # Console output
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " COMBINED MUTATION SCORE: ${SCORE}%"
          echo " Caught: ${TOTAL_CAUGHT}  Missed: ${TOTAL_MISSED}  Timeout: ${TOTAL_TIMEOUT}  Unviable: ${TOTAL_UNVIABLE}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$TOTAL_MISSED" -gt 0 ]; then
            echo ""
            echo "::error::${TOTAL_MISSED} mutant(s) survived across all crates"
            exit 1
          fi

          echo ""
          echo "All mutants caught across all crates."

  # ── Incremental mutation testing (PR only) ────────────────────────────────
  mutants-incremental:
    name: "Mutation Testing (incremental)"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history for diff

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install protoc (for gRPC feature)
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-mutants
        run: cargo install cargo-mutants

      - name: Determine changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'crates/*/src/**/*.rs')
          FILE_COUNT=$(echo "$FILES" | grep -c . 2>/dev/null || echo 0)

          if [ -z "$FILES" ] || [ "$FILE_COUNT" -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No Rust source files changed in crates/ — mutation testing will be skipped."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            # Convert to comma-separated for later parsing
            echo "files=$(echo "$FILES" | tr '\n' ',')" >> "$GITHUB_OUTPUT"
            echo ""
            echo "Changed files to mutate (${FILE_COUNT}):"
            echo "$FILES" | sed 's/^/  /'
          fi

      - name: Run mutation tests on changed files
        id: mutants
        if: steps.changed.outputs.skip == 'false'
        run: |
          echo "::group::cargo-mutants execution log"

          IFS=',' read -ra FILE_ARRAY <<< "${{ steps.changed.outputs.files }}"
          GLOB_ARGS=""
          for f in "${FILE_ARRAY[@]}"; do
            if [ -n "$f" ]; then
              GLOB_ARGS="$GLOB_ARGS --file $f"
            fi
          done

          set +e
          cargo mutants $GLOB_ARGS \
            --output mutants.out \
            --timeout 120 \
            --jobs 4 \
            -- --all-features 2>&1 | tee /tmp/mutants-run.log
          MUTANTS_EXIT=$?
          set -e

          echo "::endgroup::"
          echo "exit_code=${MUTANTS_EXIT}" >> "$GITHUB_OUTPUT"

      - name: No source changes to mutate
        if: steps.changed.outputs.skip == 'true'
        run: |
          echo "# Mutation Testing — Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No Rust source files changed in \`crates/*/src/\` — nothing to mutate." >> "$GITHUB_STEP_SUMMARY"

      - name: Generate mutation report
        if: always() && steps.changed.outputs.skip == 'false'
        run: |
          count() { if [ -f "$1" ]; then grep -c . "$1" 2>/dev/null || echo 0; else echo 0; fi; }

          CAUGHT=$(count mutants.out/caught.txt)
          MISSED=$(count mutants.out/missed.txt)
          UNVIABLE=$(count mutants.out/unviable.txt)
          TIMEOUT=$(count mutants.out/timeout.txt)
          TOTAL=$((CAUGHT + MISSED))

          if [ "$TOTAL" -gt 0 ]; then
            SCORE=$(( (CAUGHT * 100) / TOTAL ))
          else
            SCORE=100
          fi

          {
            echo "# Mutation Testing Report (incremental)"
            echo ""
            echo "Only files changed in this PR were mutated."
            echo ""
            echo "## Score: ${SCORE}%"
            echo ""
            echo "| Outcome | Count | Meaning |"
            echo "|---------|------:|---------|"
            echo "| Caught | ${CAUGHT} | Test suite detected the mutation |"
            echo "| Missed | ${MISSED} | **Test gap** — a real bug here would go undetected |"
            echo "| Timeout | ${TIMEOUT} | Mutant caused tests to hang (killed after limit) |"
            echo "| Unviable | ${UNVIABLE} | Mutation caused a compile error (not a test gap) |"
            echo ""

            if [ "$MISSED" -gt 0 ]; then
              echo "## Surviving Mutants"
              echo ""
              echo "These mutations were **not detected** by your tests."
              echo "Add or strengthen tests to cover these gaps before merging."
              echo ""
              echo '```'
              cat mutants.out/missed.txt
              echo '```'
              echo ""
            fi

            if [ "$TIMEOUT" -gt 0 ]; then
              echo "## Timed-Out Mutants"
              echo ""
              echo "These mutations caused the test suite to **hang**."
              echo ""
              echo '```'
              cat mutants.out/timeout.txt
              echo '```'
              echo ""
            fi

            if [ "$MISSED" -gt 0 ] || [ "$TIMEOUT" -gt 0 ]; then
              echo "## How to Reproduce Locally"
              echo ""
              echo '```bash'
              echo "cargo install cargo-mutants"
              echo "cargo mutants --file <path-to-file> -- --all-features"
              echo '```'
              echo ""
            fi

            if [ "$MISSED" -eq 0 ] && [ "$TIMEOUT" -eq 0 ]; then
              echo "All mutants in changed files were caught. No test gaps found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " MUTATION SCORE: ${SCORE}%"
          echo " Caught: ${CAUGHT}  Missed: ${MISSED}  Timeout: ${TIMEOUT}  Unviable: ${UNVIABLE}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$MISSED" -gt 0 ]; then
            echo ""
            echo "::error::${MISSED} mutant(s) survived in changed files — add tests that detect these mutations:"
            while IFS= read -r line; do
              FILE=$(echo "$line" | cut -d: -f1)
              LINE=$(echo "$line" | cut -d: -f2)
              MSG=$(echo "$line" | cut -d: -f3-)
              if [ -n "$FILE" ] && [ -n "$LINE" ]; then
                echo "::error file=${FILE},line=${LINE}::SURVIVED:${MSG}"
              else
                echo "  $line"
              fi
            done < mutants.out/missed.txt
          fi

          if [ "$TIMEOUT" -gt 0 ]; then
            echo ""
            echo "::warning::${TIMEOUT} mutant(s) timed out:"
            while IFS= read -r line; do
              FILE=$(echo "$line" | cut -d: -f1)
              LINE=$(echo "$line" | cut -d: -f2)
              MSG=$(echo "$line" | cut -d: -f3-)
              if [ -n "$FILE" ] && [ -n "$LINE" ]; then
                echo "::warning file=${FILE},line=${LINE}::TIMEOUT:${MSG}"
              else
                echo "  $line"
              fi
            done < mutants.out/timeout.txt
          fi

          if [ "$MISSED" -gt 0 ]; then
            exit 1
          fi

      - name: Upload mutation report
        if: always() && steps.changed.outputs.skip == 'false'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mutation-report-incremental
          path: |
            mutants.out/
            /tmp/mutants-run.log
          retention-days: 14
