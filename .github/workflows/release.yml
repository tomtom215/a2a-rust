#
# Release pipeline — triggered by version tags (v*).
#
# Jobs: validate → ci + security → package + publish-dry-run → github-release → publish
#
# All crates are published in dependency order:
#   a2a-types → a2a-client, a2a-server → a2a-sdk

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Validate tag matches all crate versions ────────────────────────────────
  validate:
    name: Validate tag & versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check all crate versions match tag
        run: |
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          FAILED=0
          for toml in crates/a2a-types/Cargo.toml crates/a2a-client/Cargo.toml crates/a2a-server/Cargo.toml crates/a2a-sdk/Cargo.toml; do
            CRATE_VERSION=$(grep '^version' "$toml" | head -1 | sed 's/.*"\(.*\)".*/\1/')
            if [ "$CRATE_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::$toml version ($CRATE_VERSION) does not match tag ($TAG_VERSION)"
              FAILED=1
            else
              echo "✓ $toml version matches tag ($TAG_VERSION)"
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

  # ── CI — full test matrix ──────────────────────────────────────────────────
  ci:
    name: CI
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test (default features)
        run: cargo test --workspace

      - name: Test (signing feature)
        run: cargo test --workspace --features signing

      - name: Test (all features)
        run: cargo test --workspace --all-features

      - name: Documentation (zero warnings)
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── Security audit ─────────────────────────────────────────────────────────
  security:
    name: Security audit
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@82eb9f621fbc699dd0918f3ea06864c14cc84246 # v2
        with:
          command: check

  # ── Package validation ─────────────────────────────────────────────────────
  package:
    name: Package
    needs: [ci, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Package all publishable crates
        run: cargo package --workspace --exclude echo-agent

  # ── Publish dry run ────────────────────────────────────────────────────────
  publish-dry-run:
    name: Publish (dry run)
    needs: [ci, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Publish dry run (dependency order)
        run: |
          cargo publish -p a2a-types --dry-run
          cargo publish -p a2a-client --dry-run
          cargo publish -p a2a-server --dry-run
          cargo publish -p a2a-sdk --dry-run

  # ── GitHub Release ─────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [package, publish-dry-run]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract changelog section for this version
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          # Write to file (handles multiline)
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md

  # ── Publish to crates.io ───────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    needs: github-release
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Publish crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish in dependency order with delays for index propagation.
          cargo publish -p a2a-types
          echo "Waiting for crates.io index to update..."
          sleep 30

          cargo publish -p a2a-client
          cargo publish -p a2a-server
          echo "Waiting for crates.io index to update..."
          sleep 30

          cargo publish -p a2a-sdk
