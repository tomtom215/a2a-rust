#
# Continuous integration — enforces all quality gates.
#
# Jobs: format, clippy, test (default + signing + tls-rustls + tracing + all-features),
#       documentation, cargo-deny (license/advisory), publish dry-run, nightly.
#
# Matrix: stable + MSRV (1.93), multi-platform.

name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Format check ─────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Clippy ───────────────────────────────────────────────────────────────
  clippy:
    name: Clippy (${{ matrix.rust }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        rust: [stable, "1.93"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-${{ matrix.rust }}-
      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Clippy (signing)
        run: cargo clippy --workspace --all-targets --features signing -- -D warnings
      - name: Clippy (tracing)
        run: cargo clippy --workspace --all-targets --features tracing -- -D warnings
      - name: Clippy (tls-rustls)
        run: cargo clippy -p a2a-client --all-targets --features tls-rustls -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.rust }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        rust: [stable, "1.93"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-${{ matrix.rust }}-
      - name: Test (default features)
        run: cargo test --workspace
      - name: Test (signing feature)
        run: cargo test --workspace --features signing
      - name: Test (tracing feature)
        run: cargo test --workspace --features tracing
      - name: Test (tls-rustls feature)
        run: cargo test -p a2a-client --features tls-rustls
      - name: Test (all features)
        run: cargo test --workspace --all-features
      - name: Test (no default features)
        run: cargo test --workspace --no-default-features

  # ── Nightly CI ──────────────────────────────────────────────────────────
  nightly:
    name: Nightly (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nightly-
      - name: Test (all features, nightly)
        run: cargo test --workspace --all-features

  # ── Documentation ────────────────────────────────────────────────────────
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-doc-
      - name: Build docs (zero warnings)
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── cargo-deny (license/advisory compliance) ─────────────────────────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # ── Publish dry-run ──────────────────────────────────────────────────────
  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-
      - name: Dry-run publish (a2a-types)
        run: cargo publish -p a2a-types --dry-run
      - name: Dry-run publish (a2a-client)
        run: cargo publish -p a2a-client --dry-run
      - name: Dry-run publish (a2a-server)
        run: cargo publish -p a2a-server --dry-run
      - name: Dry-run publish (a2a-sdk)
        run: cargo publish -p a2a-sdk --dry-run
