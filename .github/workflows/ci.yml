#
# Continuous integration — enforces all quality gates.
#
# Jobs: format, clippy, test (default + signing + tls-rustls + tracing + all-features),
#       documentation, cargo-deny (license/advisory), package validation, nightly.
#
# Matrix: stable + MSRV (1.93), multi-platform.

name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs for the same branch/PR — saves CI minutes when
# multiple commits are pushed in quick succession.  Main-branch pushes
# are NOT cancelled so merge builds always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Format check ─────────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Clippy ───────────────────────────────────────────────────────────────
  clippy:
    name: Clippy (${{ matrix.rust }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        rust: [stable, "1.93"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install protoc (for gRPC feature)
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Clippy (signing)
        run: cargo clippy --workspace --all-targets --features signing -- -D warnings
      - name: Clippy (tracing)
        run: cargo clippy --workspace --all-targets --features tracing -- -D warnings
      - name: Clippy (tls-rustls)
        run: cargo clippy -p a2a-protocol-client --all-targets --features tls-rustls -- -D warnings
      - name: Clippy (sqlite)
        run: cargo clippy -p a2a-protocol-server --all-targets --features sqlite -- -D warnings
      - name: Clippy (postgres)
        run: cargo clippy -p a2a-protocol-server --all-targets --features postgres -- -D warnings
      - name: Clippy (axum)
        run: cargo clippy -p a2a-protocol-server --all-targets --features axum -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.rust }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        rust: [stable, "1.93"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install protoc (for gRPC feature)
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Test (default features)
        run: cargo test --workspace
      - name: Test (signing feature)
        run: cargo test --workspace --features signing
      - name: Test (tracing feature)
        run: cargo test --workspace --features tracing
      - name: Test (tls-rustls feature)
        run: cargo test -p a2a-protocol-client --features tls-rustls
      - name: Test (sqlite feature)
        run: cargo test -p a2a-protocol-server --features sqlite
      - name: Test (postgres feature)
        run: cargo test -p a2a-protocol-server --features postgres
      - name: Test (axum feature)
        run: cargo test -p a2a-protocol-server --features axum
      - name: Test (all features)
        run: cargo test --workspace --all-features
      - name: Test (no default features)
        run: cargo test --workspace --no-default-features

  # ── Nightly CI ──────────────────────────────────────────────────────────
  nightly:
    name: Nightly (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install protoc (for gRPC feature)
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Test (all features, nightly)
        run: cargo test --workspace --all-features

  # ── Documentation ────────────────────────────────────────────────────────
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build docs (zero warnings)
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── cargo-deny (license/advisory compliance) ─────────────────────────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: EmbarkStudios/cargo-deny-action@82eb9f621fbc699dd0918f3ea06864c14cc84246 # v2
        with:
          command: check

  # ── Package validation ──────────────────────────────────────────────────
  #
  # Uses `cargo package --workspace` so that inter-workspace path+version
  # dependencies resolve against sibling crates rather than crates.io.
  # Individual `cargo package -p <crate>` (and `cargo publish --dry-run`)
  # resolve deps from the registry, failing when versions aren't published yet.
  # Excludes examples since they are `publish = false` and omit dep versions.
  package:
    name: Package validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Package all publishable crates
        run: cargo package --workspace --exclude echo-agent --exclude agent-team --exclude multi-lang-team --exclude rig-a2a-agent --exclude genai-a2a-agent --exclude a2a-tck --exclude a2a-benchmarks
