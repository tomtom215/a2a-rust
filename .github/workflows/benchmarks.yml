#
# Benchmark suite — runs criterion benchmarks, generates book page, and commits results.
#
# Trigger: on-demand (workflow_dispatch) and pushes to main.
# After benchmarks complete, the results page is committed to main,
# which triggers the docs workflow to rebuild GitHub Pages.

name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "benches/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  bench:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install python3 (for result extraction)
        run: python3 --version

      - name: Build benchmarks
        run: cargo bench -p a2a-benchmarks --no-run

      # ── Run each benchmark module ────────────────────────────────────

      - name: Run protocol_overhead
        run: cargo bench -p a2a-benchmarks --bench protocol_overhead

      - name: Run task_lifecycle
        run: cargo bench -p a2a-benchmarks --bench task_lifecycle

      - name: Run transport_throughput
        run: cargo bench -p a2a-benchmarks --bench transport_throughput

      - name: Run concurrent_agents
        run: cargo bench -p a2a-benchmarks --bench concurrent_agents

      - name: Run cross_language (Rust only)
        run: cargo bench -p a2a-benchmarks --bench cross_language

      - name: Run realistic_workloads
        run: cargo bench -p a2a-benchmarks --bench realistic_workloads

      - name: Run error_paths
        run: cargo bench -p a2a-benchmarks --bench error_paths

      - name: Run backpressure
        run: cargo bench -p a2a-benchmarks --bench backpressure

      - name: Run data_volume
        run: cargo bench -p a2a-benchmarks --bench data_volume

      - name: Run memory_overhead
        run: cargo bench -p a2a-benchmarks --bench memory_overhead

      - name: Run enterprise_scenarios
        run: cargo bench -p a2a-benchmarks --bench enterprise_scenarios

      - name: Run production_scenarios
        run: cargo bench -p a2a-benchmarks --bench production_scenarios

      - name: Run advanced_scenarios
        run: cargo bench -p a2a-benchmarks --bench advanced_scenarios

      # ── Generate and commit book page ────────────────────────────────

      - name: Generate benchmark results page
        run: ./benches/scripts/generate_book_page.sh

      - name: Commit benchmark results to book
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add book/src/reference/benchmarks.md
          if git diff --cached --quiet; then
            echo "No benchmark result changes to commit."
          else
            git commit -m "chore: update benchmark results

          Auto-generated by the Benchmarks workflow.
          Source: benches/scripts/generate_book_page.sh"
            git push
          fi

      # ── Archive raw criterion reports ────────────────────────────────

      - name: Upload criterion reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: criterion-reports
          path: target/criterion/
          retention-days: 30
