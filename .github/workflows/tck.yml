# SPDX-License-Identifier: Apache-2.0
# Technology Compatibility Kit (TCK) — conformance testing
name: TCK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tck-self-test:
    name: TCK self-test (echo-agent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # Build both the echo agent and TCK
      - name: Build echo-agent and TCK
        run: cargo build --release -p echo-agent -p a2a-tck

      # Start the echo agent in the background
      - name: Start echo-agent
        run: |
          ./target/release/echo-agent &
          sleep 2
        env:
          A2A_BIND_ADDR: "127.0.0.1:9090"

      # Run TCK against JSON-RPC binding
      - name: TCK — JSON-RPC binding
        run: ./target/release/a2a-tck --url http://127.0.0.1:9090 --binding jsonrpc

      # Run TCK against REST binding
      - name: TCK — REST binding
        run: ./target/release/a2a-tck --url http://127.0.0.1:9090 --binding rest

  tck-cross-language:
    name: TCK cross-language (${{ matrix.sdk }})
    runs-on: ubuntu-latest
    # Run on both PRs and pushes to main to prevent merging broken cross-language agents
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk: python
            setup: |
              pip install -r itk/agents/python/requirements.txt
              python itk/agents/python/agent.py &
              sleep 3
            port: 9100
          - sdk: javascript
            setup: |
              cd itk/agents/js-agent && npm install && node index.js &
              sleep 3
            port: 9101
          - sdk: go
            setup: |
              cd itk/agents/go-agent && go mod tidy && go run . &
              sleep 3
            port: 9102
          - sdk: java
            setup: |
              cd itk/agents/java-agent && mvn -q compile exec:java &
              sleep 5
            port: 9103
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Setup Python
        if: matrix.sdk == 'python'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Setup Node.js
        if: matrix.sdk == 'javascript'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Setup Go
        if: matrix.sdk == 'go'
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.22'

      - name: Setup Java
        if: matrix.sdk == 'java'
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build TCK
        run: cargo build --release -p a2a-tck

      - name: Setup ${{ matrix.sdk }} agent
        run: ${{ matrix.setup }}

      - name: Wait for agent to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:${{ matrix.port }}/.well-known/agent-card.json > /dev/null 2>&1; then
              echo "Agent ready on port ${{ matrix.port }}"
              exit 0
            fi
            sleep 1
          done
          echo "Agent failed to start on port ${{ matrix.port }}"
          exit 1

      - name: TCK — ${{ matrix.sdk }} (JSON-RPC)
        run: ./target/release/a2a-tck --url http://127.0.0.1:${{ matrix.port }} --binding jsonrpc

      - name: TCK — ${{ matrix.sdk }} (REST)
        run: ./target/release/a2a-tck --url http://127.0.0.1:${{ matrix.port }} --binding rest
